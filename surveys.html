<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveys</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fff4f4;
            margin: 0;
            padding: 0;
            text-align: center;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .back-button {
            position: fixed;
            left: 20px;
            top: 20px;
            font-size: 16px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            background: #ff4d6d;
            padding: 10px 15px;
            border-radius: 25px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            z-index: 100;
        }

        .back-button:hover {
            background: #ff2e53;
            transform: scale(1.05);
        }

        .survey-container {
            max-width: 600px;
            margin: 80px auto 20px;
            padding: 20px;
            width: 90%;
        }

        h2 {
            color: #ff4d6d;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.1);
        }

        .categories {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        }

        .category {
            background: white;
            border: none;
            padding: 25px 20px;
            border-radius: 15px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #ff4d6d;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 77, 109, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            position: relative;
            overflow: hidden;
        }

        .category:before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            opacity: 0;
            transition: 0.3s;
            z-index: 1;
        }

        .category:hover:before {
            opacity: 0.1;
        }

        .category:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.2);
        }

        .category i {
            font-size: 24px;
            color: #ff4d6d;
            margin-bottom: 10px;
            z-index: 2;
        }

        .category span {
            position: relative;
            z-index: 2;
        }

        /* Add icons using emoji as a fallback */
        .category[data-icon]::after {
            content: attr(data-icon);
            font-size: 32px;
            margin-bottom: 10px;
        }

        @media (max-width: 600px) {
            .survey-container {
                margin-top: 60px;
                padding: 15px;
            }

            .categories {
                grid-template-columns: 1fr;
                gap: 15px;
            }

            .category {
                padding: 20px 15px;
            }

            h2 {
                font-size: 24px;
                margin-bottom: 20px;
            }
        }

        /* Updated Chatbot Styles */
        .chat-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 300px;
            height: 400px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .chat-header {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            padding: 12px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .chat-messages {
            flex-grow: 1;
            padding: 12px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #fafafa;
        }

        .message {
            max-width: 85%;
            padding: 8px 12px;
            border-radius: 12px;
            margin: 2px 0;
            font-size: 13px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-message {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bot-message {
            background: white;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chat-input {
            display: flex;
            padding: 10px;
            gap: 8px;
            border-top: 1px solid #eee;
            background: white;
        }

        .chat-input input {
            flex-grow: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 13px;
            transition: border-color 0.3s;
        }

        .chat-input input:focus {
            border-color: #ff4d6d;
        }

        .chat-input button {
            background: linear-gradient(45deg, #ff4d6d, #ff758c);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .chat-input button:hover {
            transform: translateY(-1px);
            box-shadow: 0 2px 5px rgba(255, 77, 109, 0.3);
        }

        .minimize-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            transition: 0.3s;
        }

        .minimize-btn:hover {
            transform: scale(1.1);
        }

        .chat-container.minimized {
            height: 50px;
            width: 200px;
        }

        .chat-container.minimized .chat-messages,
        .chat-container.minimized .chat-input {
            display: none;
        }

        /* Loading animation */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 12px;
            background: white;
            border-radius: 12px;
            width: fit-content;
            margin: 5px 0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: #ff4d6d;
            border-radius: 50%;
            animation: typingAnimation 1s infinite ease-in-out;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingAnimation {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
    </style>
</head>
<body>
    <a href="homepage.html" class="back-button">← Back</a>
    
    <div class="survey-container">
        <h2>Choose Your Survey</h2>
        <div class="categories">
            <button class="category" onclick="location.href='relationship.html'" data-icon="❤️">
                <span>Relationship Satisfaction</span>
            </button>
            <button class="category" onclick="location.href='communication.html'" data-icon="💭">
                <span>Communication Style</span>
            </button>
            <button class="category" onclick="location.href='memories.html'" data-icon="📸">
                <span>Memorable Moments</span>
            </button>
            <button class="category" onclick="location.href='plans.html'" data-icon="🎯">
                <span>Future Plans</span>
            </button>
            <button class="category" onclick="location.href='preferences.html'" data-icon="🌟">
                <span>Personality & Preferences</span>
            </button>
        </div>
    </div>

    <!-- Updated Chatbot Container -->
    <div class="chat-container" id="chatContainer">
        <div class="chat-header">
            <span>💬 Relationship Assistant</span>
            <button class="minimize-btn" onclick="toggleChat()">−</button>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message" id="initialGreeting">
                Hi! I'm your relationship assistant. I'm here to help you with relationship advice, communication tips, and emotional support. How can I assist you today?
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Update greeting based on relationship status
        window.addEventListener('DOMContentLoaded', function() {
            const relationshipStatus = localStorage.getItem('relationshipStatus');
            const greetingDiv = document.getElementById('initialGreeting');
            
            if (relationshipStatus) {
                let statusMessage = '';
                switch(relationshipStatus) {
                    case 'Good Job':
                        statusMessage = ' I see your relationship is in a good place - that\'s wonderful!';
                        break;
                    case 'Needs Work':
                        statusMessage = ' I understand your relationship could use some attention - I\'m here to help.';
                        break;
                    case 'Bad':
                        statusMessage = ' I know things are difficult right now - let\'s work through this together.';
                        break;
                }
                if (greetingDiv) {
                    greetingDiv.textContent = greetingDiv.textContent + statusMessage;
                }
            }
        });

        function toggleChat() {
            const container = document.getElementById('chatContainer');
            container.classList.toggle('minimized');
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        async function sendMessage() {
            const input = document.getElementById('userInput');
            const message = input.value.trim();
            
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';

            // Add typing indicator
            const messagesDiv = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'typing-indicator';
            typingDiv.innerHTML = `
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;

            try {
                // Get relationship status and survey data from localStorage if available
                const relationshipStatus = localStorage.getItem('relationshipStatus') || null;
                const lastSurveyDate = localStorage.getItem('lastSurveyDate') || null;
                const surveyAnswers = localStorage.getItem('surveyAnswers') || null;
                
                const response = await fetch('http://localhost:5001/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        message: message,
                        relationshipStatus: relationshipStatus,
                        lastSurveyDate: lastSurveyDate,
                        surveyAnswers: surveyAnswers ? JSON.parse(surveyAnswers) : null
                    })
                });

                const data = await response.json();
                
                // Remove typing indicator
                messagesDiv.removeChild(typingDiv);
                
                if (data.error) {
                    addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                } else {
                    // Handle both array of messages and single message (backward compatibility)
                    const messages = Array.isArray(data.response) ? data.response : [data.response];
                    
                    // Display messages one by one with a delay for natural flow
                    messages.forEach((msg, index) => {
                        setTimeout(() => {
                            addMessage(msg, 'bot');
                        }, index * 600); // 600ms delay between messages - feels fast and natural
                    });
                }
            } catch (error) {
                // Remove typing indicator
                if (messagesDiv.contains(typingDiv)) {
                    messagesDiv.removeChild(typingDiv);
                }
                console.error('Chatbot error:', error);
                addMessage('Sorry, I\'m having trouble connecting to the chatbot server. Please make sure the Chatbot API is running on port 5001.', 'bot');
            }
        }

        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message`;
            messageDiv.textContent = text;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
