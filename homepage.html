<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memolink</title>
    <link rel="stylesheet" href="renderer/styles.css">
    <style>
        /* Add styles for the new music button */
        .nav-icon {
            cursor: pointer;
            padding: 10px;
        }
        .question-modal {
            display: none;
            background-color: rgba(255, 255, 255, 0.9);
            padding: 20px;
            border-radius: 10px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .question-modal button {
            margin: 5px;
        }
    </style>
</head>
<body>
    <header>
        <div id="top-bar">
            <div id="app-logo">
                <img src="renderer/memo.png" alt="Memolink Logo">
                <span>Memolink✨</span>
            </div>
            <div id="menu-icon">&#9776;</div>
        </div>
    </header>

    <section id="profile-section">
        <img id="profile-pic" src="renderer/profile.png" alt="Profile Picture" class="profile-pic">
        <span id="username">User</span>
    </section>

    <section class="quote-container">
        <p id="quote-box">Loading....</p>
    </section>

    <section id="features">
        <div class="feature-box" id="love">
            <h3>My Loved Ones</h3>
        </div>
        <div class="feature-box" id="imp-date">
            <h3>Important Dates Tracker</h3>
        </div>
        <div class="feature-box" id="notif">
            <h3>Notifications</h3>
        </div>
        <div class="feature-box" id="surveys">
            <h3>Surveys</h3>
        </div>
    </section>

    <nav id="bottom-nav">
        <div class="nav-icon" id="notes-btn">Notes🗒️</div>
        <div class="nav-icon" id="gift-btn">Gift🎁</div>
    </nav>

    <div id="dynamic-content"></div>

    <script src="renderer/homepage.js"></script>
</body>
</html>
